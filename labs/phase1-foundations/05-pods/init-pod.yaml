apiVersion: v1
kind: Pod
metadata:
  name: init-pod
spec:
  initContainers:
  - name: init-check
    image: busybox:latest
    command: ["sh", "-c", "echo 'Init: preparing...'; sleep 3; echo ready > /work-dir/ready.txt; echo 'Init: done'"]
    volumeMounts:
    - name: workdir
      mountPath: /work-dir
  containers:
  - name: main
    image: nginx:alpine
    command: ["sh", "-c", "echo 'Main started'; nginx -g 'daemon off;'"]
    volumeMounts:
    - name: workdir
      mountPath: /work-dir
  volumes:
  - name: workdir
    emptyDir: {}
